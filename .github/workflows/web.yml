name: ui_core web checks

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  web-build:
    name: Build NUI
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: web

    steps:
      - name: Check out resource
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web packages
        run: npm ci

      - name: Build browser bundle
        run: npm run build
